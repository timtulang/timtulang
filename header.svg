<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes flicker {
        0%, 95%, 100% { opacity: 1; }
        96% { opacity: 0.4; }
        97% { opacity: 1; }
        98% { opacity: 0.2; }
        99% { opacity: 1; }
      }
      @keyframes scanline {
        0% { transform: translateY(-280px); }
        100% { transform: translateY(280px); }
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes typing1 {
        from { width: 0; }
        to { width: 420px; }
      }
      @keyframes typing2 {
        from { width: 0; }
        to { width: 320px; }
      }
      @keyframes typing3 {
        from { width: 0; }
        to { width: 380px; }
      }
      .screen { animation: flicker 8s infinite; }
      .scan { animation: scanline 4s linear infinite; opacity: 0.04; }
      .cursor { animation: blink 1s step-end infinite; }
      .line1 { animation: fadeIn 0.1s 0.3s both; }
      .line2 { animation: fadeIn 0.1s 1.2s both; }
      .line3 { animation: fadeIn 0.1s 2.0s both; }
      .line4 { animation: fadeIn 0.1s 2.8s both; }
      .line5 { animation: fadeIn 0.1s 3.6s both; }
      .line6 { animation: fadeIn 0.1s 4.2s both; }
      .line7 { animation: fadeIn 0.1s 4.8s both; }
      .line8 { animation: fadeIn 0.1s 5.4s both; }
      .line9 { animation: fadeIn 0.1s 5.9s both; }
      .block { animation: fadeIn 0.1s 6.4s both; }
    </style>
    <clipPath id="screen-clip">
      <rect x="0" y="0" width="900" height="280" rx="0"/>
    </clipPath>
  </defs>

  <rect width="900" height="280" fill="#0a0a0a"/>

  <g class="screen">
    <rect x="30" y="20" width="840" height="240" fill="#080808" rx="4"
          stroke="#FF6600" stroke-width="1" stroke-opacity="0.6"/>

    <rect x="30" y="20" width="840" height="1.5" fill="#FF6600" opacity="0.4"/>
    <rect x="30" y="258" width="840" height="1.5" fill="#FF6600" opacity="0.4"/>
    <rect x="30" y="20" width="1.5" height="240" fill="#FF6600" opacity="0.4"/>
    <rect x="868.5" y="20" width="1.5" height="240" fill="#FF6600" opacity="0.4"/>

    <rect x="30" y="20" width="840" height="240" fill="url(#scanFill)" clip-path="url(#screen-clip)"/>

    <rect class="scan" x="30" y="0" width="840" height="60" fill="#FF6600"/>

    <text x="50" y="46" font-family="'Courier New', Courier, monospace" font-size="11" fill="#FF6600" opacity="0.5" class="line1">NERV UNIFIED COMPUTER SYSTEM — MAGI TERMINAL v3.0</text>
    <text x="780" y="46" font-family="'Courier New', Courier, monospace" font-size="11" fill="#FF6600" opacity="0.5" class="line1">AUTHORIZED</text>

    <line x1="44" y1="52" x2="856" y2="52" stroke="#FF6600" stroke-width="0.5" stroke-opacity="0.3" class="line1"/>

    <text x="50" y="72" font-family="'Courier New', Courier, monospace" font-size="11" fill="#555" class="line2">$  cat /nerv/pilots/active/tulang_t.profile</text>

    <text x="50" y="95" font-family="'Courier New', Courier, monospace" font-size="22" fill="#FF6600" font-weight="bold" letter-spacing="3" class="line3">TULANG, TIMOTHY JOHN</text>

    <text x="50" y="116" font-family="'Courier New', Courier, monospace" font-size="11" fill="#FF4400" opacity="0.8" class="line4">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

    <text x="50" y="135" font-family="'Courier New', Courier, monospace" font-size="12" fill="#CC4400" class="line5">
      <tspan>DESIGNATION  </tspan><tspan fill="#DDDDDD">3rd Year BS Computer Science · PLM Manila</tspan>
    </text>
    <text x="50" y="153" font-family="'Courier New', Courier, monospace" font-size="12" fill="#CC4400" class="line6">
      <tspan>GWA          </tspan><tspan fill="#FF6600" font-weight="bold">1.23</tspan><tspan fill="#888">  ·  consistently top of program</tspan>
