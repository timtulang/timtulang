    <rect x="820" y="32" width="8" height="8" fill="#FF6600" rx="1" opacity="0.9"/>
    <text x="833" y="40" font-family="'Courier New', Courier, monospace" font-size="9" fill="#FF6600" opacity="0.6">REC</text>
  </g>
</svg>
