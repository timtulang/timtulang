    <text x="50" y="189" font-family="'Courier New', Courier, monospace" font-size="12" fill="#CC4400" class="line8">
      <tspan>STACK        </tspan><tspan fill="#DDDDDD">Java · React · Supabase · TensorFlow · FlutterFlow</tspan>
    </text>

    <text x="50" y="210" font-family="'Courier New', Courier, monospace" font-size="11" fill="#FF4400" opacity="0.8" class="line9">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

    <text x="50" y="232" font-family="'Courier New', Courier, monospace" font-size="12" fill="#555" class="block">
      <tspan>$  </tspan><tspan fill="#FF6600" font-style="italic">"I mustn't run away."</tspan><tspan fill="#555">  —  but I will keep building.</tspan>
    </text>

    <text x="50" y="250" font-family="'Courier New', Courier, monospace" font-size="12" fill="#555" class="block">
